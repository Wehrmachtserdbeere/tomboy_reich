  BEL_bop_communism_rightism_reduce_polpotist_influence: "Reduce Polpotist Influence"
  BEL_bop_communism_rightism_reduce_polpotist_influence_desc: "Through careful political maneuvering, we can reduce the influence of the Polpotists in the government, thereby strengthening the Rightists and their hold on power, though we'll have to argue in a way that reduces our people's war readiness."
  BEL_bop_communism_rightism_strike_a_blow_at_the_polpotists: "Strike a Blow at the Radical Agrarians"
  BEL_bop_communism_rightism_strike_a_blow_at_the_polpotists_desc: "By arresting and charging some of the more radical members of the Radical Agrarians with various crimes, we can significantly weaken their influence in the government, thereby strengthening the Rightists and their hold on power, though we'll have to argue in a way that reduces our people's war readiness."

  BEL_bop_communism_polpotism_commence_an_attack: "Commence an attack"
  BEL_bop_communism_polpotism_commence_an_attack_desc: "There is no better way to reduce the influence of the Rightists than by launching an easily deniable but effective attack on one of their bourgeois strongholds, though we might hit other targets by accident, which may anger some people."
  BEL_bop_communism_polpotism_commence_an_attack_35_tt: "Between 1 and 1000 people of this state die in the attack."
  BEL_bop_communism_polpotism_commence_an_attack_15_tt: "Between 1 and 10 nations may lose between 1 and 1000 people in the attack."



  BEL_irredentism_total_war_category: "Total War!"
  BEL_irredentism_total_war_category_desc: "We have declared a total war against the nations that continue to oppress our sisters. We will stop at nothing to free our sisters and reunify our nation, and we will fight until the end to achieve that. We swore to our people that we will do this in two years, and we will not break that promise. If we do, the consequences may break the spirits of our people for a long time."
  BEL_irredentism_total_war_start: "Total War!"
  BEL_irredentism_total_war_start_desc: "We have declared a total war against the nations that continue to oppress our sisters. We will stop at nothing to free our sisters and reunify our nation, and we will fight until the end to achieve that. We swore to our people that we will do this in two years, and we will not break that promise. If we do, the consequences may break the spirits of our people for a long time."
  BEL_irredentism_total_war_great_end: "Total War! - The Great End"
  BEL_irredentism_total_war_great_end_trigger_tt: "All §Y[BEL.GetAdjective]§! states are under our control."
  BEL_irredentism_total_war_great_end_desc: "We have won the total war against the nations that oppressed our sisters, and we have successfully reunified our nation. Our people are overjoyed, and we have achieved our goal. However, the war has taken a toll on our nation, and we will need to rebuild and recover from the devastation. But for now, we can celebrate our victory and the reunification of our nation!"
  BEL_irredentism_total_war_great_end_reward_tt: "§YGain Cores§! on all heartland [BEL.GetAdjective] states."
  BEL_irredentism_total_war_glorious_end: "Total War! - The Glorious End"
  BEL_irredentism_total_war_glorious_end_trigger_tt: "All §YGreater [BEL.GetAdjective]§! states are under our control."
  BEL_irredentism_total_war_glorious_end_desc: "\"Comrades, Workers, and Patriots!\nToday, we stand upon the soil of a unified nation, a dream forged in the crucible of sacrifice and consecrated by the blood of our heroes. We gather not as the fractured and oppressed, as we did so many years ago, but as the proud citizens of the Free Commune of Tomboys, a single, indivisible beacon of proletarian power stretching from the new industrial heartlands in the north to the fertile valleys of the south!\nWe remember the dark days. The days when our small, vibrant homeland was a vassal, a cog in the imperialist machine. They sought to tame our spirit, to break our will with their chains of economic servitude and their decadent, bourgeois ideology. They saw our strength not as a virtue, but as a threat. They sought to contain us, to strangle us in a web of borders drawn by monarchs and capitalists, lines designed to divide the working class and pit brother against sister.\nBut they did not know the unbreakable spirit of the Tomboy!\nThe Great War of Liberation was not a choice; it was a necessity. When the imperialist jackboot marched across our borders, when their bombers rained death upon our homes and factories, it was not despair that took root in our hearts, but a cold, righteous fury. From the smoldering ruins of our first towns, a new army was born. Not an army of conscripts, but an army of volunteers - farmers, machinists, dockworkers, and students. They traded their tools for rifles, their overalls for uniforms, and marched not for a flag, but for each other.\nFor years, we fought. Against the combined might of the superpowers, against their superior numbers and their war machines built on the exploitation of colonies. We fought in the winding streets of our old towns and across the vast, open fields they sought to claim. We met their technology with our ingenuity, their strategy with our unyielding resolve. We learned that a rifle in the hands of a comrade fighting for her home is worth more than a tank driven by a mercenary fighting for gold.\nAnd we won!\nThis victory is not the product of a single general or a single party. It is the victory of the collective. It belongs to the worker who toiled in the underground munitions factory, her hands raw but her spirit unbroken. It belongs to the nurse who saved countless lives under the shelling. It belongs to the farmer who fed the army on a meager harvest. It belongs to every single one of you who held the line, who believed in the cause, and who never, ever surrendered.\nToday, we erase the old, artificial lines. The river that once marked a border now flows through the heart of a single, free Commune. The cities that were once under the shadow of foreign palaces now raise the red flag of the people. From the new northern territories, with their forges and mills, to the western shores where our ships will soon sail, and to the southern sun that now warms a united land - all of it is ours.\nGlory to the working class!\nGlory to our victorious heroes!\nAnd Glory to the Tomboys!\"\n- Radio Broadcast"
  BEL_irredentism_total_war_great_end_reward_tt: "§YGain Cores§! on all §Ytrue§! [BEL.GetAdjective] states."
  BEL_irredentism_total_war_glorious_end_reward_tt: "§YGain Cores§! on all §YGreater§! [BEL.GetAdjective] states."
  BEL_irredentism_total_war_propose_peace_with_england: "Propose Peace with the [ENG.GetAdjective]"
